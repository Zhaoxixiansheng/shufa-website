<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>预约体验 - 朝夕学堂</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        ink: '#2D2926',
        red: '#A63C24',
        paper: '#F8F5F0',
        text: '#333333',
        light: '#666666'
      }
    }
  }
}
</script>
</head>
<body class="bg-paper text-text">

<header class="fixed w-full top-0 z-50 bg-ink/95 text-white">
  <div class="container mx-auto px-4 py-3 flex justify-between items-center">
    <a href="index.html" class="text-2xl font-bold">朝夕学堂</a>
    <nav class="hidden md:flex space-x-8">
      <a href="index.html" class="hover:text-red">首页</a>
      <a href="about.html" class="hover:text-red">关于我们</a>
      <a href="courses.html" class="hover:text-red">课程体系</a>
      <a href="price.html" class="hover:text-red">收费标准</a>
      <a href="works.html" class="hover:text-red">教学成果</a>
      <a href="booking.html" class="text-red">预约体验</a>
      <a href="contact.html" class="hover:text-red">联系我们</a>
    </nav>
  </div>
</header>

<section class="pt-28 pb-20">
  <div class="container mx-auto px-4">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold text-ink mb-2">预约体验课</h1>
      <p class="text-light">专业书法老师一对一体检，免费测评书写问题</p>
    </div>

    <div class="max-w-xl mx-auto bg-white p-8 rounded-xl shadow">
      <form action="https://api.web3forms.com/submit" method="POST" class="space-y-5">
        <input type="hidden" name="access_key" value="99382b52-1fca-43df-af44-636490f40a7f">
        <input type="hidden" name="subject" value="【朝夕学堂】新体验课预约">
        <input type="hidden" name="redirect" value="https://zhaoxixiansheng.github.io/thankyou.html">

        <div>
          <label class="block font-medium mb-1">孩子姓名</label>
          <input type="text" name="name" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red focus:outline-none" required>
        </div>

        <div>
          <label class="block font-medium mb-1">年级/年龄</label>
          <input type="text" name="grade" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red focus:outline-none" required>
        </div>

        <div>
          <label class="block font-medium mb-1">家长联系电话</label>
          <input type="tel" name="phone" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red focus:outline-none" required>
        </div>

        <div>
          <label class="block font-medium mb-1">意向体验时间</label>
          <select name="time" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red focus:outline-none" required>
            <option value="">请选择</option>
            <option>周末上午</option>
            <option>周末下午</option>
            <option>周中放学后</option>
          </select>
        </div>

        <div>
          <label class="block font-medium mb-1">孩子书写问题（选填）</label>
          <textarea name="message" rows="3" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red focus:outline-none" placeholder="如：坐姿、握笔、结构、潦草、慢、没耐心等"></textarea>
        </div>

        <button type="submit" class="w-full bg-red hover:bg-red/90 text-white font-bold py-3 px-6 rounded-lg transition-colors">
          提交预约 · 免费体验
        </button>
      </form>
    </div>
  </div>
</section>

<footer class="bg-ink text-white py-6">
  <div class="container mx-auto px-4 text-center text-sm">
    <p>© 2026 朝夕学堂 版权所有</p>
    <p>地址：上海市浦东新区远东大厦（第一八佰伴旁）｜电话：15300542701</p>
  </div>
</footer>

</body>
</html>
