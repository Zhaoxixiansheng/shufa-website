<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程预约 - 朝夕学堂</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo"><h1>朝夕学堂</h1></div>
            <ul class="nav-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="courses.html">课程介绍</a></li>
                <li><a href="works.html">学员作品</a></li>
                <li><a href="teacher.html">师资力量</a></li>
                <li><a href="enroll.html">在线报名</a></li>
                <li><a href="booking.html" class="active">课程预约</a></li>
                <li><a href="contact.html">联系我们</a></li>
            </ul>
            <div class="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <section style="padding: 60px 0; background: #f9f9f9;">
        <div class="container">
            <h2 class="section-title">课程预约</h2>
            <div style="max-width: 600px; margin: 0 auto; background: white; padding: 2rem; border-radius: 10px;">
                <p style="text-align: center; color: #666; margin-bottom: 2rem;">
                    请选择您想预约的时间，我们会尽快确认并联系您。
                </p>
                <form onsubmit="handleFormSubmit(event, 'booking')">
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" name="name" required>
                    </div>
                    <div class="form-group">
                        <label>联系电话</label>
                        <input type="tel" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label>预约日期</label>
                        <input type="date" name="date" required>
                    </div>
                    <div class="form-group">
                        <label>预约时间</label>
                        <select name="time" required>
                            <option value="">请选择时间段</option>
                            <option value="上午 9:00-11:00">上午 9:00-11:00</option>
                            <option value="下午 14:00-16:00">下午 14:00-16:00</option>
                            <option value="下午 16:00-18:00">下午 16:00-18:00</option>
                            <option value="晚上 19:00-21:00">晚上 19:00-21:00</option>
                        </select>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">提交预约</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 朝夕学堂 版权所有</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
