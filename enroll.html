<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线报名 - 朝夕学堂</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .enroll-section {
            padding: 60px 0;
            background: #f9f9f9;
        }
        .enroll-form {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #333;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #8B4513;
        }
        .form-group textarea {
            height: 100px;
            resize: vertical;
        }
        .required {
            color: #e74c3c;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo"><h1>朝夕学堂</h1></div>
            <ul class="nav-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="courses.html">课程介绍</a></li>
                <li><a href="works.html">学员作品</a></li>
                <li><a href="teacher.html">师资力量</a></li>
                <li><a href="enroll.html" class="active">在线报名</a></li>
                <li><a href="booking.html">课程预约</a></li>
                <li><a href="contact.html">联系我们</a></li>
            </ul>
            <div class="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <section class="enroll-section">
        <div class="container">
            <h2 class="section-title">在线报名</h2>
            
            <form class="enroll-form" onsubmit="handleFormSubmit(event, 'enroll')">
                <div class="form-group">
                    <label>学员姓名 <span class="required">*</span></label>
                    <input type="text" name="studentName" required placeholder="请输入学员姓名">
                </div>

                <div class="form-group">
                    <label>性别 <span class="required">*</span></label>
                    <select name="gender" required>
                        <option value="">请选择</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>年龄 <span class="required">*</span></label>
                    <input type="number" name="age" required placeholder="请输入年龄">
                </div>

                <div class="form-group">
                    <label>家长姓名 <span class="required">*</span></label>
                    <input type="text" name="parentName" required placeholder="请输入家长姓名">
                </div>

                <div class="form-group">
                    <label>联系电话 <span class="required">*</span></label>
                    <input type="tel" name="phone" required placeholder="请输入手机号码" pattern="[0-9]{11}">
                </div>

                <div class="form-group">
                    <label>微信号</label>
                    <input type="text" name="wechat" placeholder="请输入微信号">
                </div>

                <div class="form-group">
                    <label>选择课程 <span class="required">*</span></label>
                    <select name="course" required>
                        <option value="">请选择课程</option>
                        <option value="硬笔书法基础班">硬笔书法基础班（¥680/10 课时）</option>
                        <option value="软笔书法入门班">软笔书法入门班（¥1280/20 课时）</option>
                        <option value="书法进阶班">书法进阶班（¥1800/30 课时）</option>
                        <option value="书法集训班">书法集训班（¥299/4 课时）</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>备注</label>
                    <textarea name="notes" placeholder="如有特殊需求请说明"></textarea>
                </div>

                <button type="submit" class="btn submit-btn">提交报名</button>
            </form>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 朝夕学堂 版权所有</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
